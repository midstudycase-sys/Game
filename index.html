<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KELULUSAN X PPLG 2</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            height: 100vh;
            width: 100%;
            font-family: Arial, sans-serif;
            color: #ff0000;
            
            /* Warna cadangan */
            background-color: #000000; 
            
            /* bg */
            background-image: url('background.jpg');
            background-repeat: no-repeat;
            background-position: center;
            background-attachment: fixed;
            background-size: cover;
            
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Lapisan Hitam Transparan agar teks tetap jelas terbac */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7); 
            z-index: 1;
        }

        /* TOMBOL AWAL (OVERLAY) */
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 99;
        }

        .btn-start {
            background: transparent;
            color: #ff0000;
            border: 2px solid #ff0000;
            padding: 15px 30px;
            cursor: pointer;
            text-align: center;
        }

        .btn-start h2 { font-size: 1.5rem; letter-spacing: 3px; margin-bottom: 5px; }
        .btn-start p { font-size: 0.7rem; text-transform: uppercase; opacity: 0.8; }

        /* KONTEN UTAMA */
        .container {
            text-align: center;
            width: 95%;
            max-width: 800px;
            display: none; 
            z-index: 2;
        }

        h1 { font-size: clamp(1.4rem, 5vw, 2.2rem); margin-bottom: 10px; letter-spacing: 1px; }
        .description { color: #8b0000; font-size: 0.8rem; margin-bottom: 40px; }
        
        .timer { 
            display: flex; gap: 10px; 
            font-size: clamp(1.8rem, 8vw, 3.2rem); 
            justify-content: center; align-items: baseline; margin-bottom: 25px;
        }

        .timer-group { display: flex; flex-direction: column; align-items: center; min-width: 55px; }
        .label { font-size: 0.5rem; color: #8b0000; margin-top: 5px; text-transform: uppercase; }
        .separator { font-size: 1.5rem; padding-bottom: 15px; opacity: 0.4; }

        .progress-container { width: 80%; margin: 0 auto; }
        .progress { width: 100%; height: 3px; background: #222; margin-bottom: 8px; }
        .progress-bar { height: 100%; width: 0%; background: #555; }
        #percentText { color: #8b0000; font-size: 0.6rem; }
    </style>
</head>
<body>

    <div id="overlay">
        <div class="btn-start" onclick="initExperience()">
            <h2>X PPLG 2</h2>
            <p>Click to open</p>
        </div>
    </div>

    <div class="container" id="mainApp">
        <h1>KELULUSAN X PPLG 2</h1>
        <p class="description">Waktu tidak akan pernah berhenti sampai kamu cukup menyesal untuk menyadarinya.</p>

        <div class="timer">
            <div class="timer-group">
                <div id="months">00</div>
                <div class="label">Months</div>
            </div>
            <div class="timer-group">
                <div id="days">00</div>
                <div class="label">Days</div>
            </div>
            <div class="timer-group">
                <div id="mins">00</div>
                <div class="label">Minutes</div>
            </div>
            <div class="separator">:</div>
            <div class="timer-group">
                <div id="secs">00</div>
                <div class="label">Seconds</div>
            </div>
            <div class="timer-group">
                <div id="ms">000</div>
                <div class="label">Ms</div>
            </div>
        </div>

        <div class="progress-container">
            <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
            <div id="percentText">0.0% complete</div>
        </div>
    </div>

    <script>
        const tickingAudio = new Audio("dragon-studio-slow-cinematic-clock-ticking-405471 (1).mp3"); 
        tickingAudio.loop = true;

        // Anti-jeda suara
        tickingAudio.addEventListener('timeupdate', function(){
            var buffer = 0.50; 
            if(this.currentTime > this.duration - buffer){
                this.currentTime = 0;
                this.play();
            }
        });

        // WAKTU WIB (PURWOKERTO)
        const targetDate = new Date("2028-05-05T16:00:00+07:00").getTime();
        const startDate = new Date("2026-05-10T22:28:00+07:00").getTime();

        function initExperience() {
            tickingAudio.play();
            // Instan tanpa animasi redup
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
        }

        function updateCountdown() {
            const now = new Date().getTime();
            const diff = targetDate - now;

            if (diff <= 0) {
                document.getElementById('mainApp').innerHTML = "<h1>MISSION ACCOMPLISHED</h1>";
                return;
            }

            const m_total = Math.floor(diff / (1000 * 60 * 60 * 24 * 30.4375));
            const d_total = Math.floor((diff % (1000 * 60 * 60 * 24 * 30.4375)) / (1000 * 60 * 60 * 24));
            const mn = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const sc = Math.floor((diff % (1000 * 60)) / 1000);
            const ms = Math.floor(diff % 1000);

            document.getElementById("months").innerText = m_total;
            document.getElementById("days").innerText = d_total;
            document.getElementById("mins").innerText = mn; 
            document.getElementById("secs").innerText = String(sc).padStart(2, '0');
            document.getElementById("ms").innerText = String(ms).padStart(3, '0');

            const totalDuration = targetDate - startDate;
            const elapsed = now - startDate;
            let percent = (elapsed / totalDuration) * 100;
            if (percent < 0) percent = 0;
            if (percent > 100) percent = 100;

            document.getElementById("progressBar").style.width = percent + "%";
            document.getElementById("percentText").innerText = percent.toFixed(1) + "% complete";
        }

        setInterval(updateCountdown, 33);
        updateCountdown();
    </script>
</body>
</html>
