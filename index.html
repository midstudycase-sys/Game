<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KELULUSAN X PPLG 2</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            height: 100vh;
            width: 100%;
            font-family: Arial, sans-serif;
            color: #ff0000;
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 99;
            transition: opacity 0.8s ease;
        }

        .btn-start {
            background: transparent;
            color: #ff0000;
            border: 1px solid #ff0000;
            padding: 10px 20px;
            cursor: pointer;
            letter-spacing: 2px;
            font-size: 0.9rem;
        }

        .container {
            text-align: center;
            width: 95%;
            max-width: 800px;
            opacity: 0;
            transition: opacity 1.5s ease;
            transform: translateY(-15px);
        }

        h1 { 
            font-size: clamp(1.4rem, 5vw, 2rem);
            margin-bottom: 8px; 
            font-weight: normal;
            letter-spacing: 1px;
        }

        .description {
            color: #8b0000;
            font-size: clamp(0.65rem, 2.5vw, 0.8rem);
            margin-bottom: 45px;
            max-width: 450px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.4;
        }
        
        .timer { 
            display: flex; 
            gap: 12px; 
            font-size: clamp(1.8rem, 8vw, 3.2rem); 
            justify-content: center; 
            align-items: baseline;
            margin-bottom: 25px;
        }

        .timer-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 55px;
        }

        .label { 
            font-size: 0.45rem; 
            color: #8b0000; 
            margin-top: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .separator {
            font-size: 1.5rem;
            padding-bottom: 18px;
            opacity: 0.4;
        }

        .progress-container { 
            width: 80%; 
            margin: 0 auto; 
        }
        .progress { 
            width: 100%; 
            height: 3px; 
            background: #111;
            margin-bottom: 8px;
        }
        .progress-bar { 
            height: 100%; 
            width: 0%; 
            background: #444; 
        }
        
        #percentText { 
            color: #8b0000; 
            font-size: 0.6rem; 
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <button class="btn-start" onclick="initExperience()">SYNC SYSTEM</button>
    </div>

    <div class="container" id="mainApp">
        <h1>KELULUSAN X PPLG 2</h1>
        <p class="description">Waktu tidak akan pernah berhenti sampai kamu cukup menyesal untuk menyadarinya.</p>

        <div class="timer">
            <div class="timer-group">
                <div id="months">00</div>
                <div class="label">Months</div>
            </div>
            <div class="timer-group">
                <div id="days">00</div>
                <div class="label">Days</div>
            </div>
            <div class="timer-group">
                <div id="mins">00</div>
                <div class="label">Minutes</div>
            </div>
            <div class="separator">:</div>
            <div class="timer-group">
                <div id="secs">00</div>
                <div class="label">Seconds</div>
            </div>
            <div class="timer-group">
                <div id="ms">000</div>
                <div class="label">Ms</div>
            </div>
        </div>

        <div class="progress-container">
            <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
            <div id="percentText">0.0% complete</div>
        </div>
    </div>

    <script>
        const tickingAudio = new Audio("dragon-studio-slow-cinematic-clock-ticking-405471 (1).mp3"); 
        tickingAudio.loop = true;

        // Target: 5 Mei 2028 Jam 16:00 WIB
        const targetDate = new Date("2028-05-05T16:00:00+07:00").getTime();
        // Start: 10 Mei 2026 Jam 22:28 WIB
        const startDate = new Date("2026-05-10T22:35:00+07:00").getTime();

        function initExperience() {
            tickingAudio.play().catch(e => console.log("Audio terblokir, klik tombol lagi."));
            document.getElementById('overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('overlay').style.display = 'none';
                document.getElementById('mainApp').style.opacity = '1';
            }, 800);
        }

        function updateCountdown() {
            const now = new Date().getTime();
            const diff = targetDate - now;

            if (diff <= 0) {
                document.getElementById('mainApp').innerHTML = "<h1>MISSION ACCOMPLISHED</h1>";
                return;
            }

            // Rumus hitung mundur agar menit tidak meluap
            const m_total = Math.floor(diff / (1000 * 60 * 60 * 24 * 30.4375));
            const d_total = Math.floor((diff % (1000 * 60 * 60 * 24 * 30.4375)) / (1000 * 60 * 60 * 24));
            const mn = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const sc = Math.floor((diff % (1000 * 60)) / 1000);
            const ms = Math.floor(diff % 1000);

            document.getElementById("months").innerText = m_total;
            document.getElementById("days").innerText = d_total;
            document.getElementById("mins").innerText = mn; 
            document.getElementById("secs").innerText = String(sc).padStart(2, '0');
            document.getElementById("ms").innerText = String(ms).padStart(3, '0');

            const totalDuration = targetDate - startDate;
            const elapsed = now - startDate;
            let percent = (elapsed / totalDuration) * 100;

            if (percent < 0) percent = 0;
            if (percent > 100) percent = 100;

            document.getElementById("progressBar").style.width = percent + "%";
            document.getElementById("percentText").innerText = percent.toFixed(1) + "% complete";
        }

        setInterval(updateCountdown, 33);
        updateCountdown();
    </script>
</body>
</html>
