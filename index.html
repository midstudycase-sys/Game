<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KELULUSAN X PPLG 2</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            height: 100vh;
            width: 100%;
            font-family: Arial, sans-serif; /* Menggunakan font simpel seperti di gambar */
            color: #ff0000;
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 99;
            transition: opacity 0.8s ease;
        }

        .btn-start {
            background: transparent;
            color: #ff0000;
            border: 1px solid #ff0000;
            padding: 10px 20px;
            cursor: pointer;
            font-size: 1rem;
        }

        .container {
            text-align: center;
            width: 95%;
            max-width: 800px;
            opacity: 0;
            transition: opacity 1.5s ease;
        }

        h1 { 
            font-size: 2.2rem; 
            margin-bottom: 10px; 
            font-weight: normal;
        }

        .description {
            color: #8b0000; /* Merah gelap seperti di gambar */
            font-size: 0.9rem;
            margin-bottom: 50px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.4;
        }
        
        /* Layout Angka Timer */
        .timer { 
            display: flex; 
            gap: 15px; /* Jarak antar angka disesuaikan */
            font-size: 3.5rem; /* Angka diperbesar */
            justify-content: center; 
            align-items: baseline;
            margin-bottom: 20px;
        }

        .timer-group {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .label { 
            font-size: 0.5rem; 
            color: #8b0000; 
            margin-top: 5px;
            text-transform: uppercase;
        }

        .separator {
            font-size: 2rem;
            padding-bottom: 20px;
        }

        /* Progress Bar Tipis Abu-abu */
        .progress-container { 
            width: 80%; 
            margin: 0 auto; 
        }
        .progress { 
            width: 100%; 
            height: 4px; 
            background: #333333; /* Warna abu-abu gelap */
            margin-bottom: 8px;
        }
        .progress-bar { 
            height: 100%; 
            width: 0%; 
            background: #ff0000; 
        }
        
        #percentText { 
            color: #8b0000; 
            font-size: 0.7rem; 
        }
    </style>
</head>
<body>

    <div id="overlay">
        <button class="btn-start" onclick="initExperience()">SYNC SYSTEM</button>
    </div>

    <div class="container" id="mainApp">
        <h1>KELULUSAN X PPLG 2</h1>
        <p class="description">Waktu tidak akan pernah berhenti sampai kamu cukup menyesal untuk menyadarinya.</p>

        <div class="timer">
            <div class="timer-group">
                <div id="months">00</div>
                <div class="label">Months</div>
            </div>
            <div class="timer-group">
                <div id="days">24</div>
                <div class="label">Days</div>
            </div>
            <div class="timer-group">
                <div id="mins">00</div>
                <div class="label">Minutes</div>
            </div>
            <div class="separator">:</div>
            <div class="timer-group">
                <div id="secs">00</div>
                <div class="label">Seconds</div>
            </div>
            <div class="timer-group">
                <div id="ms">000</div>
                <div class="label">Ms</div>
            </div>
        </div>

        <div class="progress-container">
            <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
            <div id="percentText">0.0% complete</div>
        </div>
    </div>

    <script>
        // Pastikan nama file audio sama persis
        const tickingAudio = new Audio("dragon-studio-slow-cinematic-clock-ticking-405471 (1).mp3); 
        tickingAudio.loop = true;

        const targetDate = new Date("2028-05-05T16:00:00");
        const startDate = new Date("2026-04-10T19:43:00");

        function initExperience() {
            tickingAudio.play().catch(e => console.log("Audio error"));
            document.getElementById('overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('overlay').style.display = 'none';
                document.getElementById('mainApp').style.opacity = '1';
            }, 800);
        }

        function updateCountdown() {
            const now = new Date();
            const diff = targetDate - now;

            if (diff <= 0) {
                document.getElementById('mainApp').innerHTML = "<h1>GAME START</h1>";
                return;
            }

            const months = Math.floor(diff / (1000 * 60 * 60 * 24 * 30.44));
            const days = Math.floor((diff / (1000 * 60 * 60 * 24)) % 30.44);
            const mins = Math.floor(diff / (1000 * 60)); // Menit total seperti di gambar
            const secs = Math.floor((diff / 1000) % 60);
            const ms = Math.floor(diff % 1000);

            document.getElementById("months").innerText = months;
            document.getElementById("days").innerText = days;
            document.getElementById("mins").innerText = mins;
            document.getElementById("secs").innerText = String(secs).padStart(2, '0');
            document.getElementById("ms").innerText = String(ms).padStart(3, '0');

            const totalDuration = targetDate - startDate;
            const elapsed = now - startDate;
            const percent = Math.max(0, (elapsed / totalDuration) * 100);

            document.getElementById("progressBar").style.width = percent + "%";
            document.getElementById("percentText").innerText = percent.toFixed(1) + "% complete";
        }

        setInterval(updateCountdown, 33);
        updateCountdown();
    </script>
</body>
</html>
