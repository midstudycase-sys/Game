<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KELULUSAN X PPLG 2</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            height: 100vh;
            width: 100%;
            font-family: Arial, sans-serif;
            color: #ff0000;
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 99;
            transition: opacity 0.8s ease;
        }

        .btn-start {
            background: transparent;
            color: #ff0000;
            border: 1px solid #ff0000;
            padding: 10px 20px;
            cursor: pointer;
            letter-spacing: 2px;
        }

        .container {
            text-align: center;
            width: 95%;
            max-width: 800px;
            opacity: 0;
            transition: opacity 1.5s ease;
            transform: translateY(-10px);
        }

        h1 { 
            font-size: clamp(1.5rem, 6vw, 2.2rem);
            margin-bottom: 10px; 
            font-weight: normal;
            letter-spacing: 1px;
        }

        .description {
            color: #8b0000;
            font-size: clamp(0.7rem, 3vw, 0.85rem);
            margin-bottom: 40px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.4;
        }
        
        .timer { 
            display: flex; 
            gap: 10px; 
            font-size: clamp(1.8rem, 8vw, 3.2rem); 
            justify-content: center; 
            align-items: baseline;
            margin-bottom: 20px;
        }

        .timer-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 50px;
        }

        .label { 
            font-size: 0.5rem; 
            color: #8b0000; 
            margin-top: 5px;
            text-transform: uppercase;
        }

        .separator {
            font-size: 1.5rem;
            padding-bottom: 15px;
            opacity: 0.6;
        }

        .progress-container { 
            width: 85%; 
            margin: 0 auto; 
        }
        .progress { 
            width: 100%; 
            height: 3px; 
            background: #1a1a1a;
            margin-bottom: 8px;
        }
        .progress-bar { 
            height: 100%; 
            width: 0%; 
            background: #444; /* Warna abu-abu seperti gambar 2 */
        }
        
        #percentText { 
            color: #8b0000; 
            font-size: 0.65rem; 
        }
    </style>
</head>
<body>

    <div id="overlay">
        <button class="btn-start" onclick="initExperience()">SYNC SYSTEM</button>
    </div>

    <div class="container" id="mainApp">
        <h1>KELULUSAN X PPLG 2</h1>
        <p class="description">Waktu tidak akan pernah berhenti sampai kamu cukup menyesal untuk menyadarinya.</p>

        <div class="timer">
            <div class="timer-group">
                <div id="months">00</div>
                <div class="label">Months</div>
            </div>
            <div class="timer-group">
                <div id="days">00</div>
                <div class="label">Days</div>
            </div>
