<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KELULUSAN X PPLG 2</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            height: 100vh;
            width: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ff0000;
            background-color: #000; 
            background-image: url('background.jpg');
            background-repeat: no-repeat;
            background-position: center;
            background-attachment: fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Overlay gelap agar background tidak menabrak teks */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.75); 
            z-index: 1;
        }

        /* EFEK GLOW MERAH NYALA */
        .glow-text {
            text-shadow: 0 0 5px rgba(255, 0, 0, 0.3), 0 0 20px rgba(255, 0, 0, 0.1);
        }

        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 99;
        }

        .btn-start {
            background: transparent;
            color: #ff0000;
            border: 2px solid #ff0000;
            padding: 20px 40px;
            cursor: pointer;
            text-align: center;
            box-shadow: inset 0 0 15px rgba(255, 0, 0, 0.2), 0 0 15px rgba(255, 0, 0, 0.2);
        }

        .btn-start h2 { font-size: 2rem; letter-spacing: 5px; margin-bottom: 5px; text-shadow: 0 0 10px red; }
        .btn-start p { font-size: 0.9rem; text-transform: uppercase; opacity: 0.8; }

        .container {
            text-align: center;
            width: 95%;
            max-width: 900px;
            display: none; 
            z-index: 2;
        }

        h1 { 
            font-size: clamp(2rem, 8vw, 3.5rem); 
            margin-bottom: 15px; 
            letter-spacing: 2px;
            font-weight: bold;
        }

        .description { 
            color: #b30000; 
            font-size: clamp(0.9rem, 3vw, 1.2rem); 
            margin-bottom: 50px; 
            font-style: italic;
        }
        
        /* UKURAN TIMER DIPERBESAR */
        .timer { 
            display: flex; 
            gap: 15px; 
            font-size: clamp(2.5rem, 10vw, 5rem); /* Angka jauh lebih besar */
            justify-content: center; 
            align-items: baseline; 
            margin-bottom: 30px;
            font-weight: bold;
        }

        .timer-group { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-width: 80px; 
        }

        /* LABEL (MONTHS, DAYS, DLL) DIPERBESAR */
        .label { 
            font-size: clamp(0.7rem, 2vw, 1rem); 
            color: #ff3333; 
            margin-top: 10px; 
            text-transform: uppercase; 
            letter-spacing: 2px;
            font-weight: normal;
        }

        .separator { 
            font-size: 2.5rem; 
            padding-bottom: 40px; 
            opacity: 0.6; 
        }

        .progress-container { width: 85%; margin: 0 auto; }
        .progress { width: 100%; height: 6px; background: #220000; margin-bottom: 12px; border-radius: 10px; overflow: hidden; }
        .progress-bar { 
            height: 100%; 
            width: 0%; 
            background: linear-gradient(90deg, #660000, #ff0000); 
            box-shadow: 0 0 15px #ff0000;
        }
        #percentText { color: #ff3333; font-size: 1rem; font-weight: bold; }
    </style>
</head>
<body>

    <div id="overlay">
        <div class="btn-start" onclick="initExperience()">
            <h2 class="glow-text">X PPLG 2</h2>
            <p>Click to open</p>
        </div>
    </div>

    <div class="container" id="mainApp">
        <h1 class="glow-text">KELULUSAN X PPLG 2</h1>
        <p class="description">"Waktu tidak akan pernah berhenti sampai kamu cukup menyesal untuk menyadarinya."</p>

        <div class="timer glow-text">
            <div class="timer-group">
                <div id="months">00</div>
                <div class="label">Months</div>
            </div>
            <div class="timer-group">
                <div id="days">00</div>
                <div class="label">Days</div>
            </div>
            <div class="timer-group">
                <div id="mins">00</div>
                <div class="label">Minutes</div>
            </div>
            <div class="separator">:</div>
            <div class="timer-group">
                <div id="secs">00</div>
                <div class="label">Seconds</div>
            </div>
            <div class="timer-group">
                <div id="ms">000</div>
                <div class="label">Ms</div>
            </div>
        </div>

        <div class="progress-container">
            <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
            <div id="percentText">0.0% complete</div>
        </div>
    </div>

    <script>
        const tickingAudio = new Audio("dragon-studio-slow-cinematic-clock-ticking-405471 (1).mp3"); 
        tickingAudio.loop = true;

        tickingAudio.addEventListener('timeupdate', function(){
            var buffer = 0.50; 
            if(this.currentTime > this.duration - buffer){
                this.currentTime = 0;
                this.play();
            }
        });

        const targetDate = new Date("2028-05-05T16:00:00+07:00").getTime();
        const startDate = new Date("2026-05-10T22:28:00+07:00").getTime();

        function initExperience() {
            tickingAudio.play();
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
        }

        function updateCountdown() {
            const now = new Date().getTime();
            const diff = targetDate - now;

            if (diff <= 0) {
                document.getElementById('mainApp').innerHTML = "<h1 class='glow-text'>MISSION ACCOMPLISHED</h1>";
                return;
            }

            const m_total = Math.floor(diff / (1000 * 60 * 60 * 24 * 30.4375));
            const d_total = Math.floor((diff % (1000 * 60 * 60 * 24 * 30.4375)) / (1000 * 60 * 60 * 24));
            const mn = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const sc = Math.floor((diff % (1000 * 60)) / 1000);
            const ms = Math.floor(diff % 1000);

            document.getElementById("months").innerText = m_total;
            document.getElementById("days").innerText = d_total;
            document.getElementById("mins").innerText = mn; 
            document.getElementById("secs").innerText = String(sc).padStart(2, '0');
            document.getElementById("ms").innerText = String(ms).padStart(3, '0');

            const totalDuration = targetDate - startDate;
            const elapsed = now - startDate;
            let percent = (elapsed / totalDuration) * 100;
            if (percent < 0) percent = 0;
            if (percent > 100) percent = 100;

            document.getElementById("progressBar").style.width = percent + "%";
            document.getElementById("percentText").innerText = percent.toFixed(2) + "% complete";
        }

            setInterval(updateCountdown, 33);
            updateCountdown();
    </script>
</body>
</html>
